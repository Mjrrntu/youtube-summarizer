<!doctype html>
<html>
<head>
  <meta charset="utf-8">

  <style>
    body {
      font-family: sans-serif;
      width: 620px;
      padding: 12px;
      margin: 0;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }

    #output {
      margin-top: 12px;
      line-height: 1.45;
      max-height: 700px;
      overflow-y: auto;
    }

    #output h1,
    #output h2,
    #output h3 {
      margin-top: 1em;
      margin-bottom: 0.5em;
    }

    #output ul {
      padding-left: 20px;
    }

    #output table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    #output th,
    #output td {
      border: 1px solid #ccc;
      padding: 6px;
      vertical-align: top;
      text-align: left;
    }

    #output code {
      background: #eee;
      padding: 2px 4px;
      border-radius: 3px;
    }

    #output pre {
      background: #f5f5f5;
      padding: 10px;
      overflow-x: auto;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <div class="buttons">
    <button id="summarize">
      AI-yhteenveto
    </button>

    <button id="tech-analysis">
      Tech Analysis
    </button>
  </div>

  <div id="status"></div>

  <div id="output"></div>

  <script src="marked.min.js"></script>
  <script src="popup.js"></script>

</body>
</html>
