<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <title>YouTube AI Analysis</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
    }

    #status {
      padding: 0.75rem 1rem;
      background: #f0f0f0;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 0.4rem 0.6rem;
      vertical-align: top;
    }

    pre {
      background: #eee;
      padding: 1rem;
      overflow-x: auto;
    }

    code {
      background: #eee;
      padding: 0.1rem 0.25rem;
    }

    .meta {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1 id="title">YouTube AI Analysis</h1>
  <div id="status">Käynnistetään...</div>
  <div id="meta" class="meta"></div>
  <div id="output"></div>

  <script src="marked.min.js"></script>
  <script src="result.js"></script>
</body>
</html>
